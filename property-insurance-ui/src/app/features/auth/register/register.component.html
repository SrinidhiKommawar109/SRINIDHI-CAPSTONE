<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 px-6 py-12">
  <div class="max-w-md w-full">
    <!-- Card -->
    <div
      class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 p-8 md:p-10">

      <!-- Brand -->
      <div class="flex flex-col items-center mb-8">
        <div
          class="w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center shadow-lg shadow-emerald-200 dark:shadow-emerald-900/20 mb-4">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="white" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight">Create an Account</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Join PropShield Insurance platform</p>
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Error Alert -->
        <div *ngIf="errorMessage"
          class="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800 rounded-xl p-4 flex gap-3 animate-in fade-in slide-in-from-top-2 duration-300">
          <svg class="w-5 h-5 text-red-500 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 8v4M12 16h.01" />
          </svg>
          <span class="text-sm font-medium text-red-600 dark:text-red-400">{{errorMessage}}</span>
        </div>

        <!-- Full Name -->
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Full
            Name</label>
          <div class="relative group">
            <input formControlName="fullName" type="text" placeholder="John Doe"
              class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all"
              [class.border-red-400]="formSubmitted && form.get('fullName')?.invalid">
          </div>
        </div>

        <!-- Email -->
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Email
            Address</label>
          <div class="relative group">
            <input formControlName="email" type="email" placeholder="name@company.com"
              class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all"
              [class.border-red-400]="formSubmitted && form.get('email')?.invalid">
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-1.5">
          <label
            class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Password</label>
          <input formControlName="password" type="password" placeholder="••••••••"
            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all"
            [class.border-red-400]="formSubmitted && form.get('password')?.invalid">
        </div>

        <!-- Referral Code -->
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Referral
            Code (Optional)</label>
          <input formControlName="referralCode" type="text" placeholder="REF-ID-NAME"
            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
        </div>


        <!-- Captcha -->
        <div
          class="space-y-1.5 bg-emerald-50/50 dark:bg-emerald-950/20 rounded-2xl p-4 border border-emerald-100 dark:border-emerald-900/30">
          <div class="flex items-center justify-between mb-2">
            <label class="text-xs font-bold text-emerald-700 dark:text-emerald-400 uppercase tracking-wider">Security
              Check</label>
            <button type="button" (click)="generateCaptcha()"
              class="text-xs text-emerald-600 dark:text-emerald-400 hover:underline">Refresh</button>
          </div>
          <p class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-3">{{captchaQuestion}}</p>
          <input formControlName="captchaAnswer" type="number" placeholder="Your answer"
            class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all"
            [class.border-red-400]="formSubmitted && form.get('captchaAnswer')?.invalid">
        </div>

        <button type="submit" [disabled]="loading"
          class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-70 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-200 dark:shadow-none transition-all hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2">
          <span *ngIf="!loading">Create Account</span>
          <span *ngIf="loading" class="flex items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none">
              </circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            Registering...
          </span>
        </button>
      </form>

      <!-- Footer -->
      <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
        <p class="text-sm text-slate-500 dark:text-slate-400">
          Already have an account?
          <a routerLink="/login" class="text-emerald-600 dark:text-emerald-400 font-semibold hover:underline">Sign
            In</a>
        </p>
      </div>

    </div>
  </div>
</div>
