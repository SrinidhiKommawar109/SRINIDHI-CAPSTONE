<div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-slate-900 dark:text-white">Requests Waiting for Final Approval</h2>
        <button type="button"
            class="rounded-full border border-slate-300 px-3 py-1 text-[11px] hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-900"
            (click)="loadPending()">Refresh</button>
    </div>

    <div *ngIf="loading" class="text-xs text-slate-500 mb-3">Loading requests…</div>
    <div *ngIf="error" class="text-xs text-rose-600 mb-3">{{ error }}</div>
    <div *ngIf="!loading && getRequestsForApproval().length === 0"
        class="text-center py-12 bg-white rounded-xl border border-dashed border-slate-200 dark:bg-slate-900 dark:border-slate-800">
        <p class="text-xs text-slate-500">No requests waiting for final approval.</p>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
        <div *ngFor="let req of getRequestsForApproval()"
            class="rounded-xl border border-slate-200 bg-white p-4 text-xs text-slate-700 space-y-3 dark:border-slate-800 dark:bg-slate-900">
            <div class="flex items-center justify-between">
                <span class="font-bold text-slate-900 dark:text-white">Request #{{ req.id }}</span>
                <span
                    class="rounded-full bg-emerald-50 px-2.5 py-0.5 text-[10px] font-medium text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400">
                    {{ req.status }}
                </span>
            </div>
            <div class="space-y-1">
                <p><span class="text-slate-400 uppercase text-[9px] font-bold tracking-wider">Plan:</span>
                    {{ req.plan?.planName || ('Plan ' + req.planId) }}</p>
                <p><span class="text-slate-400 uppercase text-[9px] font-bold tracking-wider">Customer:</span>
                    #{{ req.customerId }}</p>
                <p><span class="text-slate-400 uppercase text-[9px] font-bold tracking-wider">Agent:</span>
                    #{{ req.agentId }}</p>
            </div>
            <div class="pt-2 border-t border-slate-100 dark:border-slate-800">
                <button type="button"
                    class="w-full rounded-md bg-slate-900 px-4 py-2 text-xs font-bold text-white hover:bg-slate-800 transition-all dark:bg-slate-50 dark:text-slate-950 dark:hover:bg-slate-200"
                    (click)="approveAfterCustomer(req.id)">
                    Final Approve &amp; Issue Policy
                </button>
            </div>
        </div>
    </div>
</div>
