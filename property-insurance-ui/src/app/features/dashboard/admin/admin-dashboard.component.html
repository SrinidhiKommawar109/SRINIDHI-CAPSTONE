<div class="flex min-h-screen bg-slate-50 dark:bg-slate-950">
    <!-- Sidebar -->
    <aside
        class="w-64 border-r border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900 hidden md:flex flex-col">
        <div class="px-6 py-8">
            <nav class="space-y-1">
                <a routerLink="manage-plans"
                    routerLinkActive="bg-slate-100 text-slate-900 dark:bg-slate-800 dark:text-white"
                    class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Add &amp; Browse Policies
                </a>
                <a routerLink="assign-agents"
                    routerLinkActive="bg-slate-100 text-slate-900 dark:bg-slate-800 dark:text-white"
                    class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" y1="8" x2="19" y2="14" />
                        <line x1="22" y1="11" x2="16" y2="11" />
                    </svg>
                    Assign Agents
                </a>
                <a routerLink="approvals"
                    routerLinkActive="bg-slate-100 text-slate-900 dark:bg-slate-800 dark:text-white"
                    class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                    Policy Approval
                </a>
                <a routerLink="analytics"
                    routerLinkActive="bg-slate-100 text-slate-900 dark:bg-slate-800 dark:text-white"
                    class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18" />
                        <path d="m19 9-5 5-4-4-3 3" />
                    </svg>
                    Analytics
                </a>
                <a routerLink="user-management"
                    routerLinkActive="bg-slate-100 text-slate-900 dark:bg-slate-800 dark:text-white"
                    class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    User Management
                </a>
            </nav>
        </div>

        <!-- User Profile Section -->
        <div class="mt-auto border-t border-slate-100 p-6 dark:border-slate-800">
            <div class="flex items-center gap-3">
                <div
                    class="h-9 w-9 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold text-xs dark:bg-emerald-900/30 dark:text-emerald-400">
                    {{ user.name?.[0]?.toUpperCase() || 'A' }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-slate-900 truncate dark:text-white">
                        {{ user.name || 'Admin User' }}
                    </p>
                    <p class="text-[10px] text-slate-500 truncate dark:text-slate-400">
                        {{ user.email || 'admin@propshield.com' }}
                    </p>
                    <p class="text-[10px] font-mono text-emerald-600 truncate dark:text-emerald-400 mt-0.5">
                        {{ user.referralCode }}
                    </p>
                </div>
            </div>
            <div class="mt-4">
                <span
                    class="inline-flex items-center rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-medium text-slate-600 dark:bg-slate-800 dark:text-slate-400">
                    {{ user.role }}
                </span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto">
        <section class="max-w-6xl mx-auto px-6 py-8 md:py-12">
            <router-outlet></router-outlet>
        </section>
    </main>
</div>
