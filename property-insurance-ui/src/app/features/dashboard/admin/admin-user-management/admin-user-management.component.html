<div class="animate-in fade-in slide-in-from-bottom-4 duration-500 space-y-8">
    <!-- Header -->
    <div>
        <button type="button"
            class="flex items-center gap-2 rounded-lg bg-slate-900 px-4 py-2 text-xs font-semibold text-white hover:bg-slate-800 dark:bg-slate-50 dark:text-slate-950 dark:hover:bg-slate-200"
            (click)="toggleAddUserForm()">
            <span class="text-base">{{ showAddUserForm ? '−' : '+' }}</span>
            {{ showAddUserForm ? 'Cancel' : 'Add New Staff (Agent/Claims Officer)' }}
        </button>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="text-xs text-rose-600">{{ error }}</div>

    <!-- Add User Form -->
    <div *ngIf="showAddUserForm"
        class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <h2 class="text-sm font-semibold text-slate-900 mb-4 dark:text-white">Create Staff Account</h2>
        <div class="grid gap-4 md:grid-cols-2">
            <div class="space-y-1.5">
                <label class="text-[11px] font-medium text-slate-500 uppercase tracking-wider">Full Name</label>
                <input type="text"
                    class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-xs text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-50"
                    [(ngModel)]="newUser.fullName" placeholder="e.g. Robert Smith" />
            </div>
            <div class="space-y-1.5">
                <label class="text-[11px] font-medium text-slate-500 uppercase tracking-wider">Email Address</label>
                <input type="email"
                    class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-xs text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-50"
                    [(ngModel)]="newUser.email" placeholder="robert@propshield.com" />
            </div>
            <div class="space-y-1.5">
                <label class="text-[11px] font-medium text-slate-500 uppercase tracking-wider">Temporary
                    Password</label>
                <input type="password"
                    class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-xs text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-50"
                    [(ngModel)]="newUser.password" placeholder="••••••••" />
            </div>
            <div class="space-y-1.5">
                <label class="text-[11px] font-medium text-slate-500 uppercase tracking-wider">Assigned Role</label>
                <select
                    class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-xs text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-50"
                    [(ngModel)]="newUser.role">
                    <option value="Agent">Insurance Agent</option>
                    <option value="ClaimsOfficer">Claims Officer</option>
                </select>
            </div>
        </div>
        <div class="mt-6 flex justify-end gap-3">
            <button type="button"
                class="rounded-md border border-slate-300 px-4 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800"
                (click)="toggleAddUserForm()">Cancel</button>
            <button type="button"
                class="rounded-md bg-slate-900 px-4 py-2 text-xs font-semibold text-white hover:bg-slate-800 dark:bg-slate-50 dark:text-slate-950"
                (click)="submitUser()">Create User</button>
        </div>
    </div>

    <!-- Users Table -->
    <div
        class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden dark:bg-slate-900 dark:border-slate-800">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
            <h2 class="text-sm font-semibold text-slate-900 dark:text-white">Active Users</h2>
            <button (click)="loadStaff()"
                class="text-xs text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors">Refresh</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="bg-slate-50 dark:bg-slate-800/50">
                        <th class="px-6 py-3 font-semibold text-slate-900 dark:text-white uppercase tracking-wider">Name
                        </th>
                        <th class="px-6 py-3 font-semibold text-slate-900 dark:text-white uppercase tracking-wider">
                            Email</th>
                        <th class="px-6 py-3 font-semibold text-slate-900 dark:text-white uppercase tracking-wider">Role
                        </th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                    <tr *ngFor="let s of staff" class="hover:bg-slate-50 transition-colors dark:hover:bg-slate-800/50">
                        <td class="px-6 py-4 font-medium text-slate-900 dark:text-white">{{ s.fullName }}</td>
                        <td class="px-6 py-4 text-slate-500 dark:text-slate-400">{{ s.email }}</td>
                        <td class="px-6 py-4">
                            <span [ngClass]="{
                                'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400': s.role === 'Agent',
                                'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400': s.role === 'ClaimsOfficer',
                                'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400': s.role === 'Admin',
                                'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400': s.role === 'Customer'
                            }" class="rounded-full px-2 py-0.5 text-[10px] font-medium">
                                {{ s.role === 'Agent' ? 'Insurance Agent' : (s.role === 'ClaimsOfficer' ? 'Claims
                                Officer' : s.role) }}
                            </span>
                        </td>
                    </tr>
                    <tr *ngIf="staff.length === 0">
                        <td colspan="3" class="px-6 py-10 text-center text-slate-400 italic">No users found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
