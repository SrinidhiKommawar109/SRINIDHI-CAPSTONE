<div class="flex min-h-screen bg-slate-50 dark:bg-slate-950">
    <!-- Sidebar -->
    <aside
        class="w-64 border-r border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900 hidden md:flex flex-col">
        <div class="px-6 py-8">
            <div class="mb-8 px-3">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Claims Portal</span>
            </div>
            <nav class="space-y-1">
                <a routerLink="pending" routerLinkActive="bg-sky-50 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400"
                    class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <line x1="10" y1="9" x2="8" y2="9" />
                    </svg>
                    Pending Claims
                </a>
                <a routerLink="history" routerLinkActive="bg-sky-50 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400"
                    class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                        <path d="M3 12h1" />
                        <path d="M3 8h1" />
                        <path d="M3 16h1" />
                    </svg>
                    Processed History
                </a>
            </nav>
        </div>

        <!-- User Profile Section -->
        <div class="mt-auto border-t border-slate-100 p-6 dark:border-slate-800">
            <div class="flex items-center gap-3">
                <div
                    class="h-9 w-9 rounded-xl bg-sky-100 flex items-center justify-center text-sky-700 font-bold text-xs dark:bg-sky-900/30 dark:text-sky-400">
                    {{ user.name?.[0]?.toUpperCase() || 'C' }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-slate-900 truncate dark:text-white">
                        {{ user.name || 'Claims Officer' }}
                    </p>
                    <p class="text-[10px] text-slate-500 truncate dark:text-slate-400">
                        {{ user.email }}
                    </p>
                </div>
            </div>
            <div class="mt-4">
                <span
                    class="inline-flex items-center rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-medium text-slate-600 dark:bg-slate-800 dark:text-slate-400">
                    {{ user.role }}
                </span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto">
        <section class="max-w-6xl mx-auto px-6 py-8 md:py-12">
            <router-outlet></router-outlet>
        </section>
    </main>
</div>
