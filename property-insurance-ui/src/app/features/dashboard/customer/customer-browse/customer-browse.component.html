<div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div
        class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden dark:bg-slate-900 dark:border-slate-800">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
            <h2 class="text-base font-semibold text-slate-900 dark:text-slate-100">Available Insurance Plans</h2>
            <button (click)="loadPlans()"
                class="text-xs font-medium text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100">Refresh</button>
        </div>
        <div class="p-6">
            <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                <div *ngFor="let plan of plans"
                    class="group relative bg-slate-50 rounded-xl p-5 border border-transparent transition-all hover:border-emerald-200 hover:bg-emerald-50/30 dark:bg-slate-800/50 dark:hover:bg-emerald-950/20">
                    <div
                        class="mb-4 inline-flex h-10 w-10 items-center justify-center rounded-lg bg-emerald-100 text-emerald-600 dark:bg-emerald-900/40 dark:text-emerald-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z" />
                            <path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9" />
                        </svg>
                    </div>
                    <h3 class="text-sm font-bold text-slate-900 dark:text-slate-100 mb-1">{{ plan.planName }}</h3>
                    <div class="space-y-1 text-xs text-slate-500 dark:text-slate-400 mb-4">
                        <p>Premium: <span class="font-semibold text-slate-900 dark:text-slate-200">₹{{ plan.basePremium
                                | number: '1.2-2' }}</span></p>
                        <p>Installment: <span class="font-semibold text-slate-900 dark:text-slate-200">₹{{
                                getInstallmentAmount(plan) | number: '1.2-2' }}</span></p>
                        <p>Frequency: <span class="font-semibold text-slate-900 dark:text-slate-200">{{
                                getFrequencyLabel(plan.frequency) }}</span></p>
                    </div>
                    <button type="button"
                        class="w-full inline-flex items-center justify-center rounded-lg bg-emerald-600 px-4 py-2 text-xs font-semibold text-white transition-all hover:bg-emerald-500 focus:ring-2 focus:ring-emerald-500/20"
                        (click)="createRequestForPlan(plan.id)">
                        Request this plan
                    </button>
                </div>
            </div>
            <div *ngIf="createMessage"
                class="mt-4 p-3 bg-emerald-50 text-emerald-700 text-xs rounded-lg border border-emerald-100 dark:bg-emerald-950/30 dark:text-emerald-400 dark:border-emerald-900/50">
                {{ createMessage }}
            </div>
        </div>
    </div>
</div>
