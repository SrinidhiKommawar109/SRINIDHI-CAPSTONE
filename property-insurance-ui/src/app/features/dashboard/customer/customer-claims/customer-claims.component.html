<div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div
        class="max-w-2xl mx-auto bg-white rounded-2xl border border-slate-200 p-8 shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <h2 class="text-base font-semibold text-slate-900 mb-6 dark:text-slate-100 text-center">Submit a New Claim</h2>
        <div class="space-y-5">
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5 block">Active Policy
                    ID</label>
                <select
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500/20 transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-50"
                    [(ngModel)]="claimPayload.policyRequestId" (change)="onPolicySelect()">
                    <option [value]="0" disabled>Select an approved policy</option>
                    <option *ngFor="let p of approvedPolicies" [value]="p.id">
                        #{{ p.id }} - {{ p.plan?.planName }}
                    </option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5 block">Property
                    Address</label>
                <input type="text"
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500/20 transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-50"
                    placeholder="Where did incident occur?" [(ngModel)]="claimPayload.propertyAddress" />
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5 block">Property
                        Value</label>
                    <input type="number"
                        class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500/20 transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-50"
                        placeholder="₹" [(ngModel)]="claimPayload.propertyValue" />
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5 block">Property
                        Age</label>
                    <input type="number"
                        class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500/20 transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-50"
                        placeholder="Years" [(ngModel)]="claimPayload.propertyAge" />
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5 block">Incident
                        Date</label>
                    <input type="date" [max]="claimPayload.claimSubmittedDate"
                        class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500/20 transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-50"
                        [(ngModel)]="claimPayload.incidentDate" />
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5 block">Incident
                        Type</label>
                    <select
                        class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500/20 transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-50"
                        [(ngModel)]="claimPayload.incidentType">
                        <option value="" disabled selected>Select type</option>
                        <option value="Fire">Fire</option>
                        <option value="Theft">Theft</option>
                        <option value="Flood">Flood</option>
                        <option value="Earthquake">Earthquake</option>
                        <option value="Vandalism">Vandalism</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div>
                <label
                    class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5 block">Description</label>
                <textarea maxlength="500"
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500/20 transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-50"
                    placeholder="Describe what happened..." [(ngModel)]="claimPayload.description" rows="3"></textarea>
                <div class="flex justify-end mt-1">
                    <span class="text-[10px] text-slate-400">{{ claimPayload.description.length }}/500 characters</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-rose-600 mb-1.5 block">Impacted
                        Value (Claim Amount)</label>
                    <input type="number"
                        class="w-full rounded-xl border border-rose-200 bg-rose-50/30 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500/20 transition-all dark:bg-slate-800 dark:border-rose-900/30 dark:text-slate-50"
                        placeholder="₹" [(ngModel)]="claimPayload.claimAmount" />
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5 block">Claim
                        Submitted Date</label>
                    <input type="date" readonly
                        class="w-full rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 text-sm focus:outline-none transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400 cursor-not-allowed"
                        [(ngModel)]="claimPayload.claimSubmittedDate" />
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5 block">Supporting
                    Photos</label>
                <div class="relative">
                    <input type="file" multiple (change)="handleFileSelect($event)"
                        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept="image/*" />
                    <div
                        class="w-full rounded-xl border border-dashed border-slate-300 bg-slate-50 px-4 py-6 text-center transition-all dark:bg-slate-800 dark:border-slate-700">
                        <div class="flex flex-col items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="text-slate-400">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                            <span class="text-xs text-slate-500">Click to upload or drag & drop</span>
                        </div>
                    </div>
                </div>
                <!-- Selected Files List -->
                <div *ngIf="selectedFileNames.length > 0" class="mt-3 flex flex-wrap gap-2">
                    <span *ngFor="let name of selectedFileNames"
                        class="inline-flex items-center gap-1.5 rounded-full bg-sky-50 px-2.5 py-1 text-[10px] font-medium text-sky-700 dark:bg-sky-900/30 dark:text-sky-400">
                        {{ name }}
                    </span>
                </div>
            </div>
            <div class="pt-4">
                <button (click)="fileClaim()"
                    class="w-full rounded-xl bg-rose-600 px-6 py-4 text-sm font-bold text-white shadow-lg shadow-rose-500/20 hover:bg-rose-500 hover:-translate-y-0.5 transition-all active:translate-y-0">
                    File Claim Report
                </button>
            </div>
            <div *ngIf="claimMessage"
                class="text-center text-xs font-medium text-emerald-600 mt-4 dark:text-emerald-400">
                {{ claimMessage }}
            </div>
        </div>
    </div>

</div>
