<div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div
        class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden dark:bg-slate-900 dark:border-slate-800">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
            <h2 class="text-base font-semibold text-slate-900 dark:text-slate-100">Payment History &amp; Invoices</h2>
            <button type="button"
                class="text-xs font-medium text-slate-500 hover:text-slate-900 flex items-center gap-1 dark:text-slate-400 dark:hover:text-slate-100"
                (click)="loadInvoices()">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                    <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                    <path d="M16 16h5v5" />
                </svg>
                Refresh
            </button>
        </div>
        <div class="p-0">
            <div *ngIf="invoicesLoading" class="p-12 text-center text-sm text-slate-500">Loading invoices...</div>
            <div *ngIf="!invoicesLoading && invoices.length === 0" class="p-16 text-center">
                <div
                    class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-slate-50 text-slate-300 mb-4 dark:bg-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <line x1="16" y1="8" x2="8" y2="8" />
                        <line x1="16" y1="12" x2="8" y2="12" />
                        <line x1="16" y1="16" x2="8" y2="16" />
                    </svg>
                </div>
                <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100 mb-1">No invoices yet</h3>
                <p class="text-xs text-slate-500 max-w-[200px] mx-auto">Approved claims and active policies will appear
                    here.</p>
            </div>
            <div class="grid gap-0 divide-y divide-slate-100 dark:divide-slate-800" *ngIf="invoices.length > 0">
                <div *ngFor="let inv of invoices"
                    class="px-6 py-5 flex items-center justify-between hover:bg-slate-50/50 transition-colors dark:hover:bg-slate-800/20">
                    <div class="flex items-center gap-4">
                        <div
                            class="h-10 w-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center dark:bg-emerald-900/40 dark:text-emerald-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" />
                                <path d="M3 5v14a2 2 0 0 0 2 2h16v-5" />
                                <path d="M18 12a2 2 0 0 0 0 4h4v-4Z" />
                            </svg>
                        </div>
                        <div>
                            <div class="text-sm font-bold text-slate-900 dark:text-slate-100">{{ inv.invoiceNumber }}
                            </div>
                            <div class="text-xs text-slate-500 dark:text-slate-400">{{ inv.planName }}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-bold text-slate-900 dark:text-slate-100">₹{{ inv.totalPremium | number:
                            '1.2-2' }}</div>
                        <div class="text-[10px] text-slate-500 dark:text-slate-400">₹{{ inv.installmentAmount | number:
                            '1.2-2' }} × {{ inv.installmentCount }} installments</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
