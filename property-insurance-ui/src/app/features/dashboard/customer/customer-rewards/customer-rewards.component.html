<div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-50">
            Referral Rewards
        </h1>
        <p class="text-sm text-slate-500 mt-1 dark:text-slate-400">
            Earn rewards by inviting your friends to PropShield.
        </p>
    </div>

    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <!-- Stats Card: Count -->
        <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm">
            <div class="flex items-center gap-4 mb-4">
                <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl text-blue-600 dark:text-blue-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Total Referrals</p>
                    <h3 class="text-2xl font-bold text-slate-900 dark:text-white">{{referralsCount}}</h3>
                </div>
            </div>
        </div>

        <!-- Stats Card: Balance -->
        <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm">
            <div class="flex items-center gap-4 mb-4">
                <div class="p-3 bg-emerald-50 dark:bg-emerald-900/20 rounded-xl text-emerald-600 dark:text-emerald-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Reward Balance</p>
                    <h3 class="text-2xl font-bold text-slate-900 dark:text-white">₹{{referralBalance | number:'1.2-2'}}
                    </h3>
                </div>
            </div>
            <button (click)="onRedeem()" [disabled]="referralBalance <= 0 || loading"
                class="w-full mt-2 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white rounded-xl text-sm font-semibold transition-all">
                {{ loading ? 'Redeeming...' : 'Redeem Now' }}
            </button>
        </div>

        <!-- Referral Code Card -->
        <div
            class="bg-gradient-to-br from-indigo-600 to-violet-700 p-6 rounded-2xl shadow-lg shadow-indigo-200 dark:shadow-none text-white">
            <h3 class="text-lg font-bold mb-2">Your Referral Code</h3>
            <p class="text-indigo-100 text-xs mb-4">Share this code with friends to earn ₹50 each time someone joins.
            </p>
            <div
                class="bg-white/10 backdrop-blur-md rounded-xl p-3 border border-white/20 flex items-center justify-between">
                <code class="font-mono text-lg tracking-wider">{{referralCode}}</code>
                <svg class="w-5 h-5 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
            </div>
        </div>
    </div>
</div>
